<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V-ARCHIVE Compare</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ─── Reset & Variables ──────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #08080f;
  --bg2:     #0e0e1a;
  --bg3:     #13131f;
  --border:  #1c1c2e;
  --border2: #252538;
  --c1:      #00e5ff;
  --c1d:     #009ab0;
  --c2:      #ff3d6e;
  --c2d:     #b02040;
  --text:    #dde0f0;
  --dim:     #555575;
  --dim2:    #3a3a58;
  --gold:    #ffd060;
  --green:   #50e898;
  --radius:  8px;
  --font-display: 'Rajdhani', sans-serif;
  --font-body:    'Noto Sans KR', sans-serif;
  --font-mono:    'JetBrains Mono', monospace;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
  font-size: 14px;
  line-height: 1.5;
}

/* grid bg */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,229,255,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,.025) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none; z-index: 0;
}

/* ─── Layout ────────────────────────────────────────────────── */
.wrap { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 28px 16px 60px; }

/* ─── Header ─────────────────────────────────────────────────── */
header {
  text-align: center;
  margin-bottom: 32px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}
.logo {
  font-family: var(--font-display);
  font-size: clamp(26px, 6vw, 48px);
  font-weight: 700;
  letter-spacing: 6px;
  text-transform: uppercase;
  background: linear-gradient(120deg, var(--c1) 0%, #80c8ff 50%, var(--c2) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.subtitle {
  margin-top: 4px;
  font-size: 11px;
  color: var(--dim);
  letter-spacing: 4px;
  text-transform: uppercase;
  font-family: var(--font-mono);
}

/* ─── Card ───────────────────────────────────────────────────── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--c1), var(--c2), transparent);
}

/* ─── Mode toggle ────────────────────────────────────────────── */
.mode-btn {
  background: var(--bg); border: 1px solid var(--border2); border-radius: var(--radius);
  color: var(--dim); cursor: pointer; font-family: var(--font-mono);
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  padding: 6px 16px; transition: all .15s;
}
.mode-btn:hover { border-color: var(--c1); color: var(--c1); }
.mode-btn.on { background: rgba(0,229,255,.1); border-color: var(--c1); color: var(--c1); }

/* ─── Input Area ─────────────────────────────────────────────── */
.input-grid {
  display: grid;
  grid-template-columns: 1fr 1fr auto;
  gap: 16px;
  align-items: end;
}
@media (max-width: 700px) {
  .input-grid { grid-template-columns: 1fr 1fr; }
  .input-grid .go-col { grid-column: 1 / -1; }
}
@media (max-width: 480px) {
  .input-grid { grid-template-columns: 1fr; }
}

.field { display: flex; flex-direction: column; gap: 6px; }
.field-label {
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  font-family: var(--font-mono);
}
.player-tag {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 4px;
}
.ptag {
  font-size: 9px; font-family: var(--font-mono);
  letter-spacing: 1.5px; text-transform: uppercase;
  padding: 2px 8px; border-radius: 3px; font-weight: 700;
}
.ptag.p1 { color: var(--c1); background: rgba(0,229,255,.1); border: 1px solid rgba(0,229,255,.25); }
.ptag.p2 { color: var(--c2); background: rgba(255,61,110,.1); border: 1px solid rgba(255,61,110,.25); }

input[type=text] {
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  padding: 10px 14px;
  outline: none;
  width: 100%;
  transition: border-color .2s, box-shadow .2s;
}
input[type=text]:focus {
  border-color: var(--c1);
  box-shadow: 0 0 0 2px rgba(0,229,255,.1);
}
input[type=text]::placeholder { color: var(--dim2); }

/* btn group for 4B/5B/6B/8B */
.btn-group { display: flex; gap: 5px; flex-wrap: wrap; }
.bbtn {
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  color: var(--dim);
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 700;
  padding: 9px 14px;
  transition: all .15s;
  flex: 1;
  min-width: 44px;
}
.bbtn:hover { border-color: var(--c1); color: var(--c1); }
.bbtn.on { background: rgba(0,229,255,.1); border-color: var(--c1); color: var(--c1); }

.go-btn {
  background: linear-gradient(135deg, var(--c1), var(--c1d));
  border: none; border-radius: var(--radius);
  color: #000;
  cursor: pointer;
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 2px;
  padding: 11px 32px;
  white-space: nowrap;
  transition: opacity .2s, transform .1s;
  width: 100%;
}
.go-btn:hover { opacity: .85; }
.go-btn:active { transform: scale(.97); }
.go-btn:disabled { opacity: .4; cursor: not-allowed; }

/* ─── Filter Row ─────────────────────────────────────────────── */
.filter-area {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  align-items: flex-start;
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}

.filter-group { display: flex; flex-direction: column; gap: 6px; }
.filter-group-label {
  font-size: 9px; color: var(--dim); letter-spacing: 2px;
  text-transform: uppercase; font-family: var(--font-mono);
}
.chips { display: flex; gap: 5px; flex-wrap: wrap; }
.chip {
  background: var(--bg); border: 1px solid var(--border2); border-radius: 20px;
  color: var(--dim); cursor: pointer; font-size: 11px; font-family: var(--font-mono);
  padding: 4px 12px; transition: all .15s; user-select: none; white-space: nowrap;
}
.chip:hover { border-color: var(--c2); color: var(--c2); }
.chip.on { background: rgba(255,61,110,.08); border-color: var(--c2); color: var(--c2); }
.chip.on.c1 { background: rgba(0,229,255,.08); border-color: var(--c1); color: var(--c1); }

/* search input inline */
.search-wrap {
  flex: 1;
  min-width: 180px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.search-input {
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 20px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 12px;
  padding: 5px 14px;
  outline: none;
  transition: border-color .2s;
}
.search-input:focus { border-color: var(--c1); }
.search-input::placeholder { color: var(--dim2); }

/* (select filter deprecated - using chip buttons instead) */

/* ─── Status ─────────────────────────────────────────────────── */
.status { text-align: center; padding: 60px 20px; color: var(--dim); font-size: 14px; display: none; }
.status.show { display: block; }
.spinner {
  width: 30px; height: 30px;
  border: 2px solid var(--border2);
  border-top-color: var(--c1);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── Results ────────────────────────────────────────────────── */
#results { display: none; }
#results.show { display: block; }

/* ─── Summary cards ──────────────────────────────────────────── */
.summary {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 12px;
  align-items: center;
  margin-bottom: 20px;
}
@media (max-width: 500px) {
  .summary { grid-template-columns: 1fr 1fr; }
  .vs-col { display: none; }
}
.splayer {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px 18px;
}
.splayer.p1 { border-left: 3px solid var(--c1); }
.splayer.p2 { border-right: 3px solid var(--c2); text-align: right; }
.sname { font-family: var(--font-display); font-size: 18px; font-weight: 700; letter-spacing: 1px; }
.splayer.p1 .sname { color: var(--c1); }
.splayer.p2 .sname { color: var(--c2); }
.sstat { font-size: 12px; color: var(--dim); margin-top: 3px; }
.sstat b { color: var(--text); font-weight: 500; }
.vs { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--dim); text-align: center; }

/* ─── Tab nav ─────────────────────────────────────────────────── */
.tab-nav {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0;
}
.tab-btn {
  background: none; border: none; border-bottom: 2px solid transparent;
  color: var(--dim); cursor: pointer; font-family: var(--font-mono);
  font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
  padding: 8px 16px; margin-bottom: -1px;
  transition: color .15s, border-color .15s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.on { color: var(--c1); border-bottom-color: var(--c1); }

/* ─── Chart section ──────────────────────────────────────────── */
#tabChart { display: none; }
#tabChart.show { display: block; }
#tabStats { display: none; }
#tabStats.show { display: block; }
#tabTable { display: none; }
#tabTable.show { display: block; }

/* chart grid */
.chart-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
@media (max-width: 640px) { .chart-grid { grid-template-columns: 1fr; } }

.chart-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 20px;
}
.chart-title {
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px;
  text-transform: uppercase; color: var(--dim); margin-bottom: 16px;
}
canvas { width: 100% !important; }

/* ─── Stats section ──────────────────────────────────────────── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}
.stat-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 20px;
}
.stat-card-title {
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px;
  text-transform: uppercase; color: var(--dim); margin-bottom: 14px;
}
.level-row {
  display: grid;
  grid-template-columns: 36px 1fr 1fr 1fr;
  gap: 6px;
  align-items: center;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}
.level-row:last-child { border-bottom: none; }
.lv-num { font-family: var(--font-mono); font-size: 11px; color: var(--dim); }
.lv-bar-wrap { position: relative; height: 14px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.lv-bar-p1 { position: absolute; left: 0; top: 0; bottom: 0; background: rgba(0,229,255,.4); border-radius: 3px; transition: width .4s; }
.lv-bar-p2 { position: absolute; right: 0; top: 0; bottom: 0; background: rgba(255,61,110,.4); border-radius: 3px; transition: width .4s; }
.lv-val { font-family: var(--font-mono); font-size: 11px; text-align: center; }
.lv-val.w1 { color: var(--c1); } .lv-val.w2 { color: var(--c2); } .lv-val.eq { color: var(--dim); }

/* ─── Table ──────────────────────────────────────────────────── */
.tbl-wrap {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden;
}

.tctl {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 8px;
}
.tcount { font-size: 11px; color: var(--dim); font-family: var(--font-mono); }
.sctrl { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
.slabel { font-size: 9px; color: var(--dim); letter-spacing: 1.5px; text-transform: uppercase; font-family: var(--font-mono); }
.sbtn {
  background: var(--bg); border: 1px solid var(--border2); border-radius: 4px;
  color: var(--dim); cursor: pointer; font-size: 12px; font-family: var(--font-mono);
  padding: 4px 11px; transition: all .15s;
}
.sbtn.asc::after  { content: ' ▲'; font-size: 9px; }
.sbtn.desc::after { content: ' ▼'; font-size: 9px; }
.sbtn:hover { border-color: var(--c1); color: var(--text); }
.sbtn.on { border-color: var(--c1); color: var(--c1); background: rgba(0,229,255,.08); }

/* table rows – desktop */
.thead, .trow {
  display: grid;
  grid-template-columns: 30px minmax(0,1fr) 82px 18px 88px 70px 88px 18px 82px;
  padding: 8px 16px;
  gap: 6px;
  align-items: center;
}
.thead {
  background: var(--bg3); border-bottom: 1px solid var(--border);
  font-size: 9px; color: var(--dim); letter-spacing: 1.5px;
  text-transform: uppercase; font-family: var(--font-mono);
}
.thead .h1 { color: rgba(0,229,255,.7); }
.thead .h2 { color: rgba(255,61,110,.7); text-align: right; }
.thead .hc { text-align: center; }

.trow {
  border-bottom: 1px solid rgba(28,28,46,.7);
  transition: background .12s;
  font-size: 13px;
}
.trow:last-child { border-bottom: none; }
.trow:hover { background: rgba(255,255,255,.02); }
.trow.op1 { background: rgba(0,229,255,.015); }
.trow.op2 { background: rgba(255,61,110,.015); }

/* mobile table: stack layout */
@media (max-width: 640px) {
  .thead { display: none; }
  .trow {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto auto;
    padding: 12px 14px;
    gap: 8px;
  }
  .trow .col-num { display: none; }
  .trow .col-song { grid-column: 1; }
  .trow .col-sc1, .trow .col-mc1,
  .trow .col-bar1, .trow .col-diff,
  .trow .col-bar2, .trow .col-mc2,
  .trow .col-sc2 {
    display: none;
  }
  .trow .mobile-scores { display: flex !important; }
}

.mobile-scores {
  display: none;
  gap: 8px;
  align-items: center;
  font-family: var(--font-mono);
  font-size: 12px;
}
.ms1 { color: var(--c1); } .ms2 { color: var(--c2); }
.ms-sep { color: var(--dim); }
.ms-diff { }
.ms-diff.dp { color: var(--c1); } .ms-diff.dm { color: var(--c2); } .ms-diff.dz { color: var(--dim); }

/* cells */
.rnum { font-size: 10px; color: var(--dim); font-family: var(--font-mono); text-align: center; }
.sname2 { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.smeta { display: flex; gap: 5px; margin-top: 3px; align-items: center; flex-wrap: wrap; }

.pat {
  font-size: 9px; font-family: var(--font-mono); font-weight: 700;
  border-radius: 3px; padding: 1px 5px; letter-spacing: .5px;
}
.NM { background: rgba(80,200,80,.12); color: #60c860; border: 1px solid rgba(80,200,80,.2); }
.HD { background: rgba(80,140,255,.12); color: #6090ff; border: 1px solid rgba(80,140,255,.2); }
.MX { background: rgba(255,140,40,.12); color: #ff9030; border: 1px solid rgba(255,140,40,.2); }
.SC { background: rgba(210,70,255,.12); color: #d040ff; border: 1px solid rgba(210,70,255,.2); }

.lv { font-size: 10px; color: var(--dim); }
.fl { font-size: 10px; color: var(--dim); }

.sc {
  font-family: var(--font-mono); font-size: 12px; font-weight: 700; text-align: right;
  letter-spacing: -.3px;
}
.sc.p2s { text-align: left; }
.sc.win  { color: var(--c1); } .sc.lose { color: var(--c2); }
.sc.draw { color: var(--dim); } .sc.na { color: var(--dim2); font-size: 11px; }

.bar { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.bf { height: 100%; border-radius: 3px; }
.bf1 { background: linear-gradient(90deg, rgba(0,229,255,.5), var(--c1)); }
.bf2 { background: linear-gradient(90deg, var(--c2), rgba(255,61,110,.5)); }

.diff {
  font-size: 10px; font-family: var(--font-mono); font-weight: 700;
  text-align: center; white-space: nowrap;
}
.dp { color: var(--c1); } .dm { color: var(--c2); } .dz { color: var(--dim); }

.mc { text-align: center; font-size: 11px; }
.mci { color: var(--gold); }

/* ─── Scrollbar ──────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--dim2); }
</style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <header>
    <div class="logo">V-ARCHIVE Compare</div>
    <div class="subtitle">DJMAX RESPECT V · Score Comparison</div>
  </header>

  <!-- Search Card -->
  <div class="card">
    <!-- Mode toggle -->
    <div style="display:flex;gap:6px;margin-bottom:16px">
      <button class="mode-btn on" id="modeCmp" onclick="setMode('compare')">비교 모드</button>
      <button class="mode-btn" id="modeSolo" onclick="setMode('solo')">솔로 모드</button>
    </div>

    <div class="input-grid">
      <div class="field">
        <div class="player-tag"><span class="ptag p1" id="p1tag">PLAYER 1</span></div>
        <input type="text" id="n1" placeholder="닉네임 입력" autocomplete="off" />
      </div>
      <div class="field" id="n2field">
        <div class="player-tag"><span class="ptag p2">PLAYER 2</span></div>
        <input type="text" id="n2" placeholder="닉네임 입력" autocomplete="off" />
      </div>
      <div class="field go-col">
        <div class="field-label">버튼</div>
        <div class="btn-group" id="btnGroup">
          <button class="bbtn" data-b="4">4B</button>
          <button class="bbtn" data-b="5">5B</button>
          <button class="bbtn on" data-b="6">6B</button>
          <button class="bbtn" data-b="8">8B</button>
        </div>
      </div>
    </div>

    <!-- Go button separate row -->
    <div style="margin-top:14px">
      <button class="go-btn" id="goBtn">비교 시작</button>
    </div>

    <!-- Filter area -->
    <div class="filter-area">
      <!-- Pattern -->
      <div class="filter-group">
        <div class="filter-group-label">패턴</div>
        <div class="chips" id="patChips">
          <span class="chip" data-p="NM">NM</span>
          <span class="chip" data-p="HD">HD</span>
          <span class="chip" data-p="MX">MX</span>
          <span class="chip on" data-p="SC">SC</span>
        </div>
      </div>

      <!-- Display -->
      <div class="filter-group" id="dispFilter">
        <div class="filter-group-label">표시</div>
        <div class="chips">
          <span class="chip on c1" id="dCommon" data-d="common">공통</span>
          <span class="chip on c1" id="dP1"     data-d="p1">P1만</span>
          <span class="chip on c1" id="dP2"     data-d="p2">P2만</span>
        </div>
      </div>

      <!-- Level filter -->
      <div class="filter-group">
        <div class="filter-group-label">레벨</div>
        <div class="chips" id="lvRangeChips">
          <span class="chip on c1" data-lv="all">전체</span>
          <span class="chip" data-lv="1-5">1~5</span>
          <span class="chip" data-lv="6-10">6~10</span>
          <span class="chip" data-lv="11-15">11~15</span>
        </div>
      </div>

      <!-- Floor filter -->
      <div class="filter-group">
        <div class="filter-group-label">층(Floor)</div>
        <div class="chips" id="floorRangeChips">
          <span class="chip on c1" data-fl="all">전체</span>
          <span class="chip" data-fl="1-5">1~5</span>
          <span class="chip" data-fl="6-10">6~10</span>
          <span class="chip" data-fl="11+">11~</span>
        </div>
      </div>

      <!-- Song search -->
      <div class="search-wrap">
        <div class="filter-group-label">곡명 검색</div>
        <input type="text" class="search-input" id="songSearch" placeholder="곡명 검색..." autocomplete="off" />
      </div>
    </div>
  </div>

  <!-- Status -->
  <div class="status" id="status">
    <div class="spinner" id="spin"></div>
    <div id="smsg"></div>
  </div>

  <!-- Results -->
  <div id="results">
    <!-- Summary -->
    <div class="summary" id="summaryCompare">
      <div class="splayer p1" id="sp1"></div>
      <div class="vs vs-col">VS</div>
      <div class="splayer p2" id="sp2"></div>
    </div>
    <div class="splayer" id="summarySolo" style="display:none;margin-bottom:20px;border-left:3px solid var(--c1)"></div>

    <!-- Tab nav -->
    <div class="tab-nav">
      <button class="tab-btn on" data-tab="table">목록</button>
      <button class="tab-btn" data-tab="chart" id="tabBtnChart">점수 분포</button>
      <button class="tab-btn" data-tab="stats" id="tabBtnStats">레벨별 통계</button>
    </div>

    <!-- Table tab -->
    <div id="tabTable" class="show">
      <div class="tbl-wrap">
        <div class="tctl">
          <div class="tcount" id="tcount"></div>
          <div class="sctrl">
            <span class="slabel">정렬</span>
            <button class="sbtn on desc" data-s="level">레벨</button>
            <button class="sbtn" data-s="floor">층</button>
            <button class="sbtn" data-s="diff">점수차</button>
            <button class="sbtn" data-s="score">최고점</button>
            <button class="sbtn" data-s="name">곡명</button>
          </div>
        </div>
        <div class="thead">
          <div></div><div>곡명 / 패턴</div>
          <div class="h1" style="text-align:right">SCORE</div>
          <div class="h1 hc">MC</div>
          <div class="h1" style="text-align:right">BAR</div>
          <div class="hc">DIFF</div>
          <div class="h2">BAR</div>
          <div class="h2 hc">MC</div>
          <div class="h2">SCORE</div>
        </div>
        <div id="tbody"></div>
      </div>
    </div>

    <!-- Chart tab -->
    <div id="tabChart">
      <div class="chart-grid">
        <div class="chart-card">
          <div class="chart-title">점수 분포 (P1 vs P2)</div>
          <canvas id="chartDist" height="260"></canvas>
        </div>
        <div class="chart-card">
          <div class="chart-title">점수차 히스토그램</div>
          <canvas id="chartDiff" height="260"></canvas>
        </div>
      </div>
      <div class="chart-grid">
        <div class="chart-card">
          <div class="chart-title">패턴별 평균 점수</div>
          <canvas id="chartPat" height="220"></canvas>
        </div>
        <div class="chart-card">
          <div class="chart-title">레벨별 평균 점수</div>
          <canvas id="chartLv" height="220"></canvas>
        </div>
      </div>
    </div>

    <!-- Stats tab -->
    <div id="tabStats">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-card-title">레벨별 승패</div>
          <div>
            <div class="level-row" style="font-family:var(--font-mono);font-size:9px;letter-spacing:1px;color:var(--dim);border-bottom:1px solid var(--border)">
              <div>LV</div>
              <div style="text-align:center;grid-column:2/4">WIN BAR</div>
              <div style="text-align:center">W/D/L</div>
            </div>
          </div>
          <div id="statsLevelBody"></div>
        </div>
        <div class="stat-card">
          <div class="stat-card-title">패턴별 승패</div>
          <div id="statsPatBody"></div>
        </div>
        <div class="stat-card">
          <div class="stat-card-title">전체 요약</div>
          <div id="statsSummary"></div>
        </div>
      </div>
    </div>
  </div><!-- /results -->

</div><!-- /wrap -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
/* ─── State ─────────────────────────────────────────────────── */
let allData = [];
let selBtn  = 6;
let sortBy  = 'level';
let sortDir = 'desc'; // 'asc' | 'desc'
let mode    = 'compare';
const pats  = new Set(['SC']);
const disp  = { common: true, p1: true, p2: true };
let currentTab = 'table';
let charts = {};
let selLvRange = 'all';  // 'all' | '1-5' | '6-10' | ...
let selFloor   = 'all';  // 'all' | floor value string

/* ─── Chart defaults ─────────────────────────────────────────── */
Chart.defaults.color = '#555575';
Chart.defaults.borderColor = '#1c1c2e';
Chart.defaults.font.family = "'JetBrains Mono', monospace";
Chart.defaults.font.size = 10;

/* ─── Helpers ────────────────────────────────────────────────── */
const $ = id => document.getElementById(id);
const C1 = '#00e5ff', C2 = '#ff3d6e';
const C1a = 'rgba(0,229,255,0.5)', C2a = 'rgba(255,61,110,0.5)';

function showStatus(msg, loading = true) {
  $('status').classList.add('show');
  $('smsg').textContent = msg;
  $('spin').style.display = loading ? 'block' : 'none';
  $('results').classList.remove('show');
}
function hideStatus() { $('status').classList.remove('show'); }

/* ─── Mode ───────────────────────────────────────────────────── */
function setMode(m) {
  mode = m;
  $('modeCmp').classList.toggle('on', m === 'compare');
  $('modeSolo').classList.toggle('on', m === 'solo');
  $('n2field').style.display  = m === 'solo' ? 'none' : '';
  $('p1tag').textContent      = m === 'solo' ? 'PLAYER' : 'PLAYER 1';
  $('goBtn').textContent      = m === 'solo' ? '조회 시작' : '비교 시작';
  $('dispFilter').style.display = m === 'solo' ? 'none' : '';
}

/* ─── Filter state ───────────────────────────────────────────── */
function getLvRange() {
  if (selLvRange === 'all') return null;
  const [mn, mx] = selLvRange.split('-').map(Number);
  return { min: mn, max: mx };
}
// floor 값은 소수점 포함 숫자(예: 1.0, 6.5, 11.2)
// '1-5' → [1, 6), '6-10' → [6, 11), '11+' → [11, ∞)
function floorInRange(floorVal) {
  if (selFloor === 'all') return true;
  const f = parseFloat(floorVal);
  if (isNaN(f)) return false;
  if (selFloor === '1-5')  return f >= 1  && f < 6;
  if (selFloor === '6-10') return f >= 6  && f < 11;
  if (selFloor === '11+')  return f >= 11;
  return true;
}
function getSearch() { return $('songSearch').value.trim().toLowerCase(); }

/* ─── Fetch ──────────────────────────────────────────────────── */
async function fetchData(nick, btn) {
  const res  = await fetch(`/api/varchive?path=archive/${encodeURIComponent(nick)}/button/${btn}`);
  const data = await res.json();
  if (!data.success) throw new Error(data.message || '유저를 찾을 수 없습니다');
  return data.records;
}

/* ─── Main search ─────────────────────────────────────────────── */
async function doSearch() {
  const n1 = $('n1').value.trim();
  const n2 = mode === 'compare' ? $('n2').value.trim() : null;

  if (!n1) { showStatus('닉네임을 입력해주세요.', false); return; }
  if (mode === 'compare' && !n2) { showStatus('두 닉네임을 모두 입력해주세요.', false); return; }

  showStatus('데이터를 불러오는 중...');
  $('goBtn').disabled = true;

  try {
    if (mode === 'solo') {
      const r1 = await fetchData(n1, selBtn);
      allData = r1.map(r => ({
        key: `${r.title}|${r.pattern}`, title: r.title, name: r.name,
        pattern: r.pattern, level: r.level, floor: r.floor, floorName: r.floorName,
        r1: r, r2: null
      }));
      populateFilters();
      hideStatus();
      $('results').classList.add('show');
      $('tabBtnChart').style.display = 'none';
      $('tabBtnStats').style.display = 'none';
      if (currentTab !== 'table') switchTab('table');
    } else {
      const [r1, r2] = await Promise.all([fetchData(n1, selBtn), fetchData(n2, selBtn)]);
      const m1 = new Map(), m2 = new Map();
      r1.forEach(r => m1.set(`${r.title}|${r.pattern}`, r));
      r2.forEach(r => m2.set(`${r.title}|${r.pattern}`, r));
      const keys = new Set([...m1.keys(), ...m2.keys()]);
      allData = [];
      keys.forEach(k => {
        const a = m1.get(k) ?? null, b = m2.get(k) ?? null, base = a ?? b;
        allData.push({ key: k, title: base.title, name: base.name,
          pattern: base.pattern, level: base.level, floor: base.floor, floorName: base.floorName,
          r1: a, r2: b });
      });
      populateFilters();
      hideStatus();
      $('results').classList.add('show');
      $('tabBtnChart').style.display = '';
      $('tabBtnStats').style.display = '';
    }
    render();
    if (mode === 'compare') { renderStats(); renderCharts(); }
  } catch(e) {
    showStatus('오류: ' + e.message, false);
  } finally {
    $('goBtn').disabled = false;
  }
}

/* ─── Summary ────────────────────────────────────────────────── */
function refreshSummary() {
  if (!$('results').classList.contains('show')) return;
  const filtered = getFiltered();
  const n1 = $('n1').value.trim();

  if (mode === 'solo') {
    $('summaryCompare').style.display = 'none';
    $('summarySolo').style.display = '';
    const mc = filtered.filter(d => d.r1?.maxCombo).length;
    $('summarySolo').innerHTML = `
      <div class="sname">${n1}</div>
      <div class="sstat">전체 기록 <b>${allData.length}</b>곡 &nbsp;·&nbsp; 현재 필터 <b>${filtered.length}</b>곡</div>
      <div class="sstat">맥콤보 <b style="color:var(--gold)">${mc}</b></div>`;
  } else {
    $('summaryCompare').style.display = '';
    $('summarySolo').style.display = 'none';
    const n2 = $('n2').value.trim();
    const common = filtered.filter(d => d.r1 && d.r2);
    const w1 = common.filter(d => d.r1.score > d.r2.score).length;
    const w2 = common.filter(d => d.r2.score > d.r1.score).length;
    $('sp1').innerHTML = `<div class="sname">${n1}</div>
      <div class="sstat">승리 <b style="color:var(--c1)">${w1}</b>곡 (필터 기준)</div>
      <div class="sstat">전체 기록 <b>${allData.filter(d=>d.r1).length}</b>곡</div>`;
    $('sp2').innerHTML = `<div class="sname">${n2}</div>
      <div class="sstat">승리 <b style="color:var(--c2)">${w2}</b>곡 (필터 기준)</div>
      <div class="sstat">전체 기록 <b>${allData.filter(d=>d.r2).length}</b>곡</div>`;
  }
}

/* ─── Populate filters ───────────────────────────────────────── */
function populateFilters() {
  // 층 버튼은 고정(1~5, 6~10, 11~)이므로 이벤트만 연결
  $('floorRangeChips').querySelectorAll('.chip').forEach(c => {
    c.onclick = () => {
      selFloor = c.dataset.fl;
      $('floorRangeChips').querySelectorAll('.chip').forEach(x => x.classList.remove('on'));
      c.classList.add('on');
      onFilterChange();
    };
  });
  selFloor = 'all';
}

/* ─── Filter & sort ──────────────────────────────────────────── */
function getFiltered() {
  const lvRange = getLvRange();
  const search  = getSearch();
  return allData
    .filter(d => pats.has(d.pattern))
    .filter(d => {
      if (mode === 'solo') return true;
      if (d.r1 && d.r2)  return disp.common;
      if (d.r1 && !d.r2) return disp.p1;
      return disp.p2;
    })
    .filter(d => !lvRange || (d.level >= lvRange.min && d.level <= lvRange.max))
    .filter(d => floorInRange(d.floor))
    .filter(d => !search  || (d.name || d.title || '').toLowerCase().includes(search));
}

function sortData(data) {
  const dir = sortDir === 'asc' ? 1 : -1;
  return [...data].sort((a, b) => {
    let v = 0;
    switch (sortBy) {
      case 'name':  v = (a.name||'').localeCompare(b.name||'') || a.pattern.localeCompare(b.pattern); break;
      case 'level': v = (a.level||0) - (b.level||0); break;
      case 'floor': v = (a.floor||0) - (b.floor||0); break;
      case 'score': v = Math.max(a.r1?.score||0, a.r2?.score||0) - Math.max(b.r1?.score||0, b.r2?.score||0); break;
      case 'diff': {
        const ad = (a.r1&&a.r2) ? Math.abs(a.r1.score-a.r2.score) : -1;
        const bd = (b.r1&&b.r2) ? Math.abs(b.r1.score-b.r2.score) : -1;
        v = ad - bd; break;
      }
    }
    return v * dir;
  });
}

/* ─── Render table ────────────────────────────────────────────── */
function render() {
  refreshSummary();
  if (currentTab !== 'table') return;
  const data = sortData(getFiltered());
  $('tcount').textContent = `${data.length}개 패턴`;

  const frag = document.createDocumentFragment();
  data.forEach((d, i) => {
    const s1 = d.r1?.score ?? null, s2 = d.r2?.score ?? null;
    let c1 = 'draw', c2 = 'draw', dcls = 'dz', dtxt = '—', mdc = 'dz';
    if (mode !== 'solo' && s1 !== null && s2 !== null) {
      const diff = s1 - s2;
      if (diff > 0)      { c1='win'; c2='lose'; dcls='dp'; mdc='dp'; dtxt='+'+diff.toFixed(2); }
      else if (diff < 0) { c1='lose'; c2='win'; dcls='dm'; mdc='dm'; dtxt=diff.toFixed(2); }
      else               { dtxt='±0'; }
    } else if (mode !== 'solo') {
      if (s1===null && s2!==null) c2='win';
      else if (s2===null && s1!==null) c1='win';
    }

    const row = document.createElement('div');
    row.className = `trow${!d.r1?' op2':!d.r2?' op1':''}`;
    const meta = `<div class="sname2" title="${d.name||d.title}">${d.name||d.title}</div>
      <div class="smeta">
        <span class="pat ${d.pattern}">${d.pattern}</span>
        <span class="lv">Lv.${d.level}</span>
        ${d.floorName ? `<span class="fl">★${d.floorName}</span>` : ''}
      </div>`;

    if (mode === 'solo') {
      row.innerHTML = `
        <div class="rnum">${i+1}</div>
        <div>${meta}</div>
        <div class="sc" style="color:var(--c1);text-align:right;grid-column:3/6">${s1!==null?s1.toFixed(2):'N/A'}</div>
        <div class="mc" style="grid-column:6">${d.r1?.maxCombo?'<span class="mci">✦</span>':''}</div>
        <div style="grid-column:7/10"><div class="bar"><div class="bf bf1" style="width:${s1??0}%"></div></div></div>`;
    } else {
      row.innerHTML = `
        <div class="rnum col-num">${i+1}</div>
        <div class="col-song">${meta}
          <div class="mobile-scores">
            <span class="ms1">${s1!==null?s1.toFixed(2):'N/A'}</span>
            <span class="ms-sep">vs</span>
            <span class="ms2">${s2!==null?s2.toFixed(2):'N/A'}</span>
            ${dtxt!=='—'?`<span class="ms-diff ${mdc}">${dtxt}</span>`:''}
          </div>
        </div>
        <div class="sc ${s1!==null?c1:'na'} col-sc1">${s1!==null?s1.toFixed(2):'N/A'}</div>
        <div class="mc col-mc1">${d.r1?.maxCombo?'<span class="mci">✦</span>':''}</div>
        <div class="bar col-bar1"><div class="bf bf1" style="width:${s1??0}%"></div></div>
        <div class="diff ${dcls} col-diff">${dtxt}</div>
        <div class="bar col-bar2"><div class="bf bf2" style="width:${s2??0}%"></div></div>
        <div class="mc col-mc2">${d.r2?.maxCombo?'<span class="mci">✦</span>':''}</div>
        <div class="sc p2s ${s2!==null?c2:'na'} col-sc2">${s2!==null?s2.toFixed(2):'N/A'}</div>`;
    }
    frag.appendChild(row);
  });
  const tbody = $('tbody');
  if (!data.length) {
    tbody.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--dim);font-size:13px">조건에 맞는 곡이 없습니다</div>';
    return;
  }
  tbody.innerHTML = '';
  tbody.appendChild(frag);
}

/* ─── Render stats (필터 기반) ────────────────────────────────── */
function renderStats() {
  const filtered = getFiltered();
  const common   = filtered.filter(d => d.r1 && d.r2);
  const n1 = $('n1').value.trim(), n2 = $('n2').value.trim();

  /* level */
  const lvMap = new Map();
  common.forEach(d => {
    if (!d.level) return;
    if (!lvMap.has(d.level)) lvMap.set(d.level, {w1:0,w2:0,draw:0});
    const e = lvMap.get(d.level);
    if (d.r1.score > d.r2.score) e.w1++;
    else if (d.r2.score > d.r1.score) e.w2++;
    else e.draw++;
  });
  $('statsLevelBody').innerHTML = [...lvMap.keys()].sort((a,b)=>a-b).map(lv => {
    const e = lvMap.get(lv), total = e.w1+e.w2+e.draw;
    const p1w = total ? Math.round(e.w1/total*100) : 50;
    const wcls = e.w1>e.w2?'w1':e.w2>e.w1?'w2':'eq';
    return `<div class="level-row">
      <div class="lv-num">${lv}</div>
      <div style="grid-column:2/4"><div class="lv-bar-wrap">
        <div class="lv-bar-p1" style="width:${p1w}%"></div>
        <div class="lv-bar-p2" style="width:${100-p1w}%"></div>
      </div></div>
      <div class="lv-val ${wcls}">${e.w1}/${e.draw}/${e.w2}</div>
    </div>`;
  }).join('') || '<div style="color:var(--dim);font-size:12px;padding:12px 0">데이터 없음</div>';

  /* pattern */
  $('statsPatBody').innerHTML = ['NM','HD','MX','SC'].map(pat => {
    const pd = common.filter(d=>d.pattern===pat);
    if (!pd.length) return '';
    const w1=pd.filter(d=>d.r1.score>d.r2.score).length;
    const w2=pd.filter(d=>d.r2.score>d.r1.score).length;
    const dr=pd.length-w1-w2;
    const p1p=pd.length?Math.round(w1/pd.length*100):50;
    const wcls=w1>w2?'w1':w2>w1?'w2':'eq';
    return `<div class="level-row">
      <div class="lv-num"><span class="pat ${pat}">${pat}</span></div>
      <div style="grid-column:2/4"><div class="lv-bar-wrap">
        <div class="lv-bar-p1" style="width:${p1p}%"></div>
        <div class="lv-bar-p2" style="width:${100-p1p}%"></div>
      </div></div>
      <div class="lv-val ${wcls}">${w1}/${dr}/${w2}</div>
    </div>`;
  }).join('') || '<div style="color:var(--dim);font-size:12px;padding:12px 0">데이터 없음</div>';

  /* summary */
  const tw1=common.filter(d=>d.r1.score>d.r2.score).length;
  const tw2=common.filter(d=>d.r2.score>d.r1.score).length;
  const tdr=common.length-tw1-tw2;
  const avgD=common.length?common.reduce((s,d)=>s+(d.r1.score-d.r2.score),0)/common.length:0;
  const mc1=filtered.filter(d=>d.r1?.maxCombo).length;
  const mc2=filtered.filter(d=>d.r2?.maxCombo).length;
  const row=(label,val,color='var(--text)')=>
    `<div class="level-row" style="grid-template-columns:1fr 1fr;font-size:12px">
      <div style="color:var(--dim)">${label}</div>
      <div style="text-align:right;color:${color};font-family:var(--font-mono)">${val}</div>
    </div>`;
  $('statsSummary').innerHTML =
    row('공통 곡 수', common.length) +
    row(`${n1} 승`, tw1, 'var(--c1)') +
    row('무승부', tdr, 'var(--dim)') +
    row(`${n2} 승`, tw2, 'var(--c2)') +
    row('평균 점수차', `${avgD>=0?'+':''}${avgD.toFixed(2)}`, avgD>=0?'var(--c1)':'var(--c2)') +
    row(`${n1} 맥콤보`, mc1, 'var(--gold)') +
    `<div class="level-row" style="grid-template-columns:1fr 1fr;font-size:12px;border-bottom:none">
      <div style="color:var(--dim)">${n2} 맥콤보</div>
      <div style="text-align:right;color:var(--gold);font-family:var(--font-mono)">${mc2}</div>
    </div>`;
}

/* ─── Render charts (필터 기반) ──────────────────────────────── */
function renderCharts() {
  const common = getFiltered().filter(d => d.r1 && d.r2);
  Object.values(charts).forEach(c => c.destroy());
  charts = {};

  const scatter = common.map(d => ({ x: d.r1.score, y: d.r2.score, label: d.name }));
  charts.dist = new Chart($('chartDist'), {
    type: 'scatter',
    data: { datasets: [{ data: scatter,
      pointBackgroundColor: scatter.map(p => p.x>p.y?C1a:p.x<p.y?C2a:'rgba(255,255,255,.3)'),
      pointBorderColor: 'transparent', pointRadius: 4 }] },
    options: { responsive: true, plugins: { legend: { display: false },
      tooltip: { callbacks: { label: ctx => `${ctx.raw.label}: ${ctx.raw.x.toFixed(1)} / ${ctx.raw.y.toFixed(1)}` }}},
      scales: { x: { title:{display:true,text:'P1 Score',color:C1}, grid:{color:'#1c1c2e'} },
                y: { title:{display:true,text:'P2 Score',color:C2}, grid:{color:'#1c1c2e'} } }}
  });

  const diffs = common.map(d => d.r1.score - d.r2.score);
  const binSize = 5, bins = {};
  diffs.forEach(d => { const b=Math.floor(d/binSize)*binSize; bins[b]=(bins[b]||0)+1; });
  const binKeys = Object.keys(bins).map(Number).sort((a,b)=>a-b);
  charts.diff = new Chart($('chartDiff'), {
    type: 'bar',
    data: { labels: binKeys.map(k=>`${k>=0?'+':''}${k}`), datasets: [{ data: binKeys.map(k=>bins[k]),
      backgroundColor: binKeys.map(k=>k>0?C1a:k<0?C2a:'rgba(255,255,255,.2)'),
      borderColor: binKeys.map(k=>k>0?C1:k<0?C2:'#fff'), borderWidth:1, borderRadius:3 }] },
    options: { responsive:true, plugins:{legend:{display:false}},
      scales: { x:{grid:{color:'#1c1c2e'}}, y:{grid:{color:'#1c1c2e'},beginAtZero:true,ticks:{precision:0}} }}
  });

  const patKeys = ['NM','HD','MX','SC'];
  charts.pat = new Chart($('chartPat'), {
    type: 'bar',
    data: { labels: patKeys, datasets: [
      { label:'P1', data: patKeys.map(p=>{ const pd=common.filter(d=>d.pattern===p); return pd.length?pd.reduce((s,d)=>s+d.r1.score,0)/pd.length:null; }), backgroundColor:C1a, borderColor:C1, borderWidth:1, borderRadius:4 },
      { label:'P2', data: patKeys.map(p=>{ const pd=common.filter(d=>d.pattern===p); return pd.length?pd.reduce((s,d)=>s+d.r2.score,0)/pd.length:null; }), backgroundColor:C2a, borderColor:C2, borderWidth:1, borderRadius:4 }
    ]},
    options: { responsive:true, plugins:{legend:{labels:{color:'#dde0f0'}}},
      scales:{ x:{grid:{color:'#1c1c2e'}}, y:{grid:{color:'#1c1c2e'},min:80} }}
  });

  const lvKeys = [...new Set(common.map(d=>d.level).filter(Boolean))].sort((a,b)=>a-b);
  charts.lv = new Chart($('chartLv'), {
    type: 'line',
    data: { labels: lvKeys, datasets: [
      { label:'P1', data:lvKeys.map(lv=>{ const pd=common.filter(d=>d.level===lv); return pd.reduce((s,d)=>s+d.r1.score,0)/pd.length; }), borderColor:C1, backgroundColor:'rgba(0,229,255,.08)', tension:.3, pointRadius:3, fill:true },
      { label:'P2', data:lvKeys.map(lv=>{ const pd=common.filter(d=>d.level===lv); return pd.reduce((s,d)=>s+d.r2.score,0)/pd.length; }), borderColor:C2, backgroundColor:'rgba(255,61,110,.08)', tension:.3, pointRadius:3, fill:true }
    ]},
    options: { responsive:true, plugins:{legend:{labels:{color:'#dde0f0'}}},
      scales:{ x:{grid:{color:'#1c1c2e'}}, y:{grid:{color:'#1c1c2e'}} }}
  });
}

/* ─── Tab switch ─────────────────────────────────────────────── */
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('on', b.dataset.tab === tab));
  $('tabTable').classList.toggle('show', tab === 'table');
  $('tabChart').classList.toggle('show', tab === 'chart');
  $('tabStats').classList.toggle('show', tab === 'stats');
  if (tab === 'table') render();
  else if (tab === 'stats') renderStats();
  else if (tab === 'chart') renderCharts();
}

/* ─── Event wiring ───────────────────────────────────────────── */
document.querySelectorAll('#btnGroup .bbtn').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('#btnGroup .bbtn').forEach(x => x.classList.remove('on'));
    b.classList.add('on'); selBtn = +b.dataset.b;
  };
});

document.querySelectorAll('#patChips .chip').forEach(c => {
  c.onclick = () => {
    const p = c.dataset.p;
    if (pats.has(p)) { if (pats.size > 1) { pats.delete(p); c.classList.remove('on'); } }
    else { pats.add(p); c.classList.add('on'); }
    onFilterChange();
  };
});

document.querySelectorAll('[data-d]').forEach(c => {
  c.onclick = () => {
    const k = c.dataset.d; disp[k] = !disp[k];
    c.classList.toggle('on', disp[k]); onFilterChange();
  };
});

// 레벨 범위 버튼
document.querySelectorAll('#lvRangeChips .chip').forEach(c => {
  c.onclick = () => {
    selLvRange = c.dataset.lv;
    document.querySelectorAll('#lvRangeChips .chip').forEach(x => x.classList.remove('on'));
    c.classList.add('on');
    onFilterChange();
  };
});

// 정렬 버튼 - 같은 버튼 누르면 방향 전환
document.querySelectorAll('.sbtn').forEach(b => {
  b.onclick = () => {
    const s = b.dataset.s;
    if (sortBy === s) {
      sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    } else {
      sortBy  = s;
      sortDir = (s === 'name') ? 'asc' : 'desc';
    }
    document.querySelectorAll('.sbtn').forEach(x => {
      x.classList.remove('on', 'asc', 'desc');
      if (x.dataset.s === sortBy) { x.classList.add('on', sortDir); }
    });
    render();
  };
});

function onFilterChange() {
  render();
  if (currentTab === 'stats') renderStats();
  if (currentTab === 'chart') renderCharts();
}

$('songSearch').addEventListener('input', onFilterChange);
$('goBtn').onclick = doSearch;
[$('n1'), $('n2')].forEach(el => el.addEventListener('keydown', e => e.key === 'Enter' && doSearch()));

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.onclick = () => switchTab(btn.dataset.tab);
});
</script>
</body>
</html>
